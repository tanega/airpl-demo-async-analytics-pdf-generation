services:
  traefik:
    image: traefik:v3.2
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./backend/.env
    depends_on:
      - redis
    volumes:
      - ./backend/app:/code/app

  worker-ingestion:
    build: ./backend
    command: celery -A app.celery_app worker -Q ingestion --loglevel=info -n ingestion@%h
    env_file: ./backend/.env
    environment:
      - DATA_DIR=/code/data
    depends_on:
      - redis
    volumes:
      - ./backend/app:/code/app
      - ./data:/code/data:ro
      - db-data:/code/var/db

  worker-weekly:
    build: ./backend
    command: celery -A app.celery_app worker -Q reports-weekly --loglevel=info -n weekly@%h
    env_file: ./backend/.env
    environment:
      - DATA_DIR=/code/data
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - redis
      - minio
    volumes:
      - ./backend/app:/code/app
      - ./backend/reports:/code/reports
      - ./data:/code/data:ro
      - db-data:/code/var/db

  worker-monthly:
    build: ./backend
    command: celery -A app.celery_app worker -Q reports-monthly --loglevel=info -n monthly@%h
    env_file: ./backend/.env
    environment:
      - DATA_DIR=/code/data
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - redis
      - minio
    volumes:
      - ./backend/app:/code/app
      - ./backend/reports:/code/reports
      - ./data:/code/data:ro
      - db-data:/code/var/db

  beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file: ./backend/.env
    environment:
      - DATA_DIR=/code/data
    depends_on:
      - redis
    volumes:
      - ./backend/app:/code/app
      - ./data:/code/data:ro

volumes:
  db-data:
  minio-data:
