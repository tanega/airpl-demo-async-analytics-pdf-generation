services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./app:/code/app

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./app:/code/app
      - ./data:/code/data:ro

  beat:
    build: .
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./app:/code/app
      - ./data:/code/data:ro
